<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Color -->
  <rect width="512" height="512" rx="120" fill="#1a1a2e"/>
  
  <!-- Outer Clock Ring representing the accent color -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#e94560" stroke-width="24" stroke-linecap="round"/>
  
  <!-- Central Pin of the clock -->
  <circle cx="256" cy="256" r="16" fill="#ffffff"/>
  
  <!-- Hour Hand pointing upwards -->
  <line x1="256" y1="256" x2="256" y2="136" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
  
  <!-- Minute Hand pointing rightwards -->
  <line x1="256" y1="256" x2="356" y2="256" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
</svg>
